<!DOCTYPE html>
<html>
<head>
  <title>GitHub Dungeon Crawler</title>
  <style>
    body { width: 350px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #eee; }
    h1 { font-size: 1.2rem; color: #ff4444; margin-top: 0; }
    #status { margin-bottom: 10px; font-size: 0.9rem; color: #888; }
    #gameContainer { width: 320px; height: 320px; border: 2px solid #333; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    canvas { image-rendering: pixelated; width: 100%; height: 100%; outline: none; }
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; display: none; }
    #overlayText { font-size: 1.5rem; font-weight: bold; color: white; margin-bottom: 10px; }
    button { width: 100%; padding: 10px; background: #ff4444; border: none; color: white; cursor: pointer; font-weight: bold; margin-top: 10px; }
    button:hover { background: #cc3333; }
    button:disabled { background: #555; cursor: not-allowed; }
    #stats { margin-top: 10px; font-size: 0.9rem; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <h1>Dungeon Crawler</h1>
  <div id="status">Ready to crawl...</div>
  <div id="stats">
    <span id="hpStat">HP: -</span>
    <span id="atkStat">ATK: -</span>
    <span id="defStat">DEF: -</span>
  </div>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="144" height="144" tabindex="0"></canvas>
    <div id="overlay">
      <div id="overlayText">Game Over</div>
      <button id="retryBtn" style="width: 80%;">Retry</button>
    </div>
  </div>
  <div id="controls" style="display: flex; gap: 5px;">
    <button id="runBtn" style="flex: 2;">Generate Daily Adventure</button>
    <button id="atkBtn" style="flex: 1; background: #aa0000; margin-top: 10px;">Attack (Space)</button>
    <button id="jumpBtn" style="flex: 1; background: #0000aa; margin-top: 10px;">Jump (Shift)</button>
  </div>
  <div style="font-size: 0.7rem; color: #666; margin-top: 5px; text-align: center;">
    WASD to move | Space to Attack | Shift+Move to Jump over traps
  </div>
  <script src="popup.js"></script>
</body>
</html>
